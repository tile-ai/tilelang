name: CI Test on Metal
on: [pull_request]

env:
  UV_PYTHON: '3.12'
  VENV_DIR: tilelang_ci
  UV_NO_BUILD_ISOLATION: '1'

jobs:
  format-check:
    runs-on: [macos-latest]

    permissions:
      contents: write 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        depth: 0

    - name: Install python via uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        activate-environment: true

    - name: Ensure venv (local & persistent)
      run: uv pip install -r requirements-test.txt

    - name: Run format check
      run: |
        git submodule update --init --checkout --recursive
        mkdir -p build
        cd build; cmake .. -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DUSE_METAL=ON; cd ..
        if ! output=$(./format.sh 2>&1); then
          echo "------------------------------------"
          echo "message:"
          echo "$output"
          printf '%s\n' "$output" | grep "Please review and stage the changes."
          echo "------------------------------------"
          exit 1
        fi
        rm -rf build

  build-test-metal:
    runs-on: [macos-latest]
    needs: format-check
    permissions:
      contents: read
    env:
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        create-symlink: true
        key: ${{ github.job }}-${{ matrix.os }}

    - name: Install python via uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        activate-environment: true

    - name: Ensure venv (local & persistent)
      run: uv pip install -r requirements-test.txt -r requirements-build.txt

    - name: Install project (wheel form)
      run: uv pip install -v .

    - name: Run metal test
      run: |
        cd testing/python
        unset PYTHONPATH
        python -m pytest -k metal -v -r fE --durations=0 --timeout=3600
