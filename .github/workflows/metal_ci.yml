name: CI Test on Metal
on: [pull_request]

env:
  PYTHON_VERSION: '3.12'
  VENV_DIR: tilelang_ci

jobs:
  build-test-metal:
    runs-on: [macos-latest]
    permissions:
      contents: read
    env:
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        create-symlink: true
        key: ${{ github.job }}-${{ matrix.os }}

    - name: Install python via uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        activate-environment: true

    - name: Ensure venv (local & persistent)
      run: uv pip install -r requirements-test.txt -r requirements-build.txt

    - name: Install project (wheel form)
      run: uv pip install -v .

    - name: Run metal test
      run: |
        cd testing/python
        unset PYTHONPATH
        python -m pytest -k metal -v -r fE --durations=0 --timeout=3600
